<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Stok — IRUKA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3A1014;
    --cream:#FBF1E6;
    --panel:#FFFFFF;
    --line:#EAD4CE;
    --brown:#9E1B32;
    --brown-dark:#6B0F20;
    --sage:#5C7A5A;
    --sage-bg:#EAF0E7;
    --rust:#C97C1F;
    --rust-bg:#FBEEDD;
    --muted:#8C6E6E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Poppins',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:1180px;margin:0 auto;padding:24px 18px 60px;}

  /* ---------- LOGIN ---------- */
  .login-wrap{ min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 20px; }
  .login-card{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:40px 30px;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(43,29,20,0.08);
  }
  .login-card .mark{
    font-family:'Poppins',sans-serif;letter-spacing:.18em;font-size:11px;font-weight:700;
    color:var(--rust);text-transform:uppercase;
  }
  .brand-logo-row{ display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap; }
  .brand-logo{
    display:inline-flex;align-items:center;background:var(--brown-dark);
    padding:5px 8px;border-radius:7px;margin-bottom:0;
  }
  .brand-logo img{ display:block;height:13px;width:auto; }
  .login-card .brand-logo-row{ justify-content:center; margin-bottom:22px; }
  .login-card .brand-logo{ padding:8px 12px;border-radius:8px; }
  .login-card .brand-logo img{ height:18px; }
  .store-address{
    font-family:'Poppins',sans-serif;font-size:11px;color:var(--muted);
  }
  .login-card h1{margin:6px 0 8px;font-size:24px;line-height:1.25;color:var(--brown-dark);}
  .login-card .sub{font-family:'Poppins',sans-serif;font-size:13px;color:var(--muted);margin-bottom:30px;line-height:1.5;}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
  .role-btn{
    font-family:'Poppins',sans-serif;border:1.5px solid var(--line);background:var(--cream);
    border-radius:12px;padding:20px 10px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;
    color:var(--brown-dark);transition:all .15s ease;
  }
  .role-btn .role-icon{display:block;font-size:24px;margin-bottom:9px;}
  .role-btn.active{border-color:var(--brown);background:var(--sage-bg);color:var(--brown-dark);}
  .pin-field{margin-bottom:20px;}
  .pin-field label{font-family:'Poppins',sans-serif;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px;}
  .pin-field input{
    width:100%;font-family:'Poppins',sans-serif;border:1.5px solid var(--line);border-radius:9px;
    padding:14px 12px;font-size:17px;letter-spacing:.3em;text-align:center;
  }
  .pin-field input:focus{outline:none;border-color:var(--sage);}
  .login-error{
    font-family:'Poppins',sans-serif;font-size:12px;color:var(--rust);background:var(--rust-bg);
    padding:8px 10px;border-radius:7px;margin-bottom:14px;display:none;
  }
  .login-note{font-family:'Poppins',sans-serif;font-size:11px;color:var(--muted);margin-top:16px;line-height:1.5;}

  header.top{
    display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;justify-content:space-between;
    border-bottom:3px solid var(--brown);
    padding-bottom:16px;margin-bottom:0;
  }
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand .mark{
    font-family:'Poppins',sans-serif;
    letter-spacing:.18em;font-size:11px;font-weight:700;color:var(--rust);text-transform:uppercase;
  }
  .brand h1{margin:0;font-size:28px;font-weight:700;color:var(--brown-dark);}
  .brand .sub{font-family:'Poppins',sans-serif;font-size:12.5px;color:var(--muted);}

  .top-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .periode-box{display:flex;align-items:center;gap:8px;font-family:'Poppins',sans-serif;}
  .periode-box label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .periode-box input{
    font-family:'Poppins',sans-serif;
    border:1.5px solid var(--line);border-radius:6px;padding:7px 10px;font-size:13.5px;
    background:var(--panel);color:var(--ink);width:170px;
  }
  .periode-box input:disabled{background:var(--cream);color:var(--muted);cursor:not-allowed;}

  .session-box{ display:flex;align-items:center;gap:8px;font-family:'Poppins',sans-serif;font-size:12px; }
  .role-pill{ background:var(--brown-dark);color:#EFE3CF;padding:4px 10px;border-radius:20px;font-weight:700;font-size:11px; }
  .logout-link{color:var(--rust);text-decoration:underline;cursor:pointer;background:none;border:none;font-size:12px;padding:0;font-family:'Poppins',sans-serif;}

  /* ---------- TABS ---------- */
  .tabs{ display:flex;gap:4px;margin:16px 0 22px;font-family:'Poppins',sans-serif;border-bottom:1px solid var(--line); }
  .tab-btn{
    background:transparent;border:none;padding:10px 16px;font-size:13px;font-weight:700;color:var(--muted);
    cursor:pointer;border-bottom:3px solid transparent;border-radius:0;margin-bottom:-1px;
  }
  .tab-btn.active{ color:var(--brown-dark);border-bottom-color:var(--brown); }

  .summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:22px;}
  .stat{ background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden; }
  .stat .lbl{font-family:'Poppins',sans-serif;font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);}
  .stat .val{font-size:22px;font-weight:700;color:var(--brown-dark);margin-top:4px;}
  .stat.hero{background:var(--brown-dark);color:var(--cream);}
  .stat.hero .lbl{color:#D8C4A8;}
  .stat.hero .val{color:#fff;font-size:25px;}
  .stat.sage{background:var(--sage-bg);}
  .stat.sage .val{color:var(--sage);}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center;justify-content:space-between;font-family:'Poppins',sans-serif;}
  .toolbar .left{display:flex;gap:8px;flex-wrap:wrap;}
  button{
    font-family:'Poppins',sans-serif;border:none;border-radius:7px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;
    transition:opacity .15s ease;
  }
  button:hover{opacity:.88;}
  button:active{opacity:.72;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:var(--brown);color:#fff;}
  .btn-outline{background:transparent;color:var(--brown);border:1.5px solid var(--brown);}
  .btn-danger-text{background:transparent;color:var(--rust);padding:4px 6px;font-size:12px;}
  .btn-close{background:var(--sage);color:#fff;}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
  .btn-sm{padding:5px 10px;font-size:11.5px;}

  .table-wrap{ background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow-x:auto;margin-bottom:24px; }

  /* ---------- Mobile card view (replaces horizontal-scroll tables on narrow screens) ---------- */
  .mobile-cards, .mobile-stok-cards{display:none;}
  @media (max-width:720px){
    .table-wrap{display:none;}
    .stok-grid-wrap{display:none;}
    .mobile-cards{display:block;}
    .mobile-stok-cards{display:block;}
  }
  .item-card{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:12px;font-family:'Poppins',sans-serif;
  }
  .item-card-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
  .item-card-head input.nama-input{
    font-weight:700;font-size:14.5px;border:1.5px solid transparent;background:transparent;padding:6px 2px;
    flex:1;min-width:0;border-radius:6px;
  }
  .item-card-head input.nama-input:focus{outline:none;border-color:var(--sage);background:var(--cream);}
  .item-card-head input.satuan-input{
    width:64px;flex:0 0 auto;border:1.5px solid var(--line);border-radius:7px;padding:6px 8px;
    font-size:12.5px;text-align:center;background:var(--cream);
  }
  .item-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .mini-field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
  .mini-field input{
    width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px;
    background:var(--cream);text-align:right;font-family:'Poppins',sans-serif;
  }
  .mini-field input:focus{outline:none;border-color:var(--sage);background:#fff;}
  .item-card .result-strip{
    margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;font-size:12.5px;
  }
  .item-card .result-strip .val-lg{font-size:15px;font-weight:700;color:var(--brown-dark);}
  .item-card .result-strip .val-lg.pos{color:var(--sage);}
  .item-card .result-strip .val-lg.neg{color:var(--rust);}
  .item-card .card-footer{display:flex;justify-content:flex-end;margin-top:8px;}
  table{border-collapse:collapse;width:100%;min-width:920px;font-family:'Poppins',sans-serif;font-size:13px;}
  thead th{
    background:var(--brown-dark);color:#EFE3CF;text-align:left;padding:10px 10px;
    font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;position:sticky;top:0;
  }
  thead th.num{text-align:right;}
  tbody td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FBF6EC;}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  td input, td select{
    width:100%;border:1px solid transparent;background:transparent;font-family:'Poppins',sans-serif;
    font-size:13px;padding:5px 6px;border-radius:5px;color:var(--ink);text-align:right;
  }
  td input.text-left{text-align:left;}
  td input:hover, td select:hover{border-color:var(--line);}
  td input:focus, td select:focus{outline:none;border-color:var(--sage);background:#fff;}
  td input:disabled{color:var(--muted);cursor:not-allowed;}
  .computed{color:var(--muted);font-weight:600;}
  .computed-val{color:var(--brown-dark);font-weight:700;}
  tfoot td{ padding:12px 10px;font-weight:700;background:var(--sage-bg);border-top:2px solid var(--sage);color:var(--brown-dark); }
  .badge-low{
    display:inline-block;margin-left:6px;font-size:10px;background:var(--rust-bg);color:var(--rust);
    padding:1px 6px;border-radius:20px;font-weight:700;vertical-align:middle;
  }
  .empty{padding:40px 20px;text-align:center;color:var(--muted);font-family:'Poppins',sans-serif;}

  .history{ background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-family:'Poppins',sans-serif; }
  .history h2{margin:0 0 10px;font-size:14px;color:var(--brown-dark);font-family:'Poppins',sans-serif;}
  .history ul{list-style:none;margin:0;padding:0;}
  .history li{ display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px;gap:10px; }
  .history li:last-child{border-bottom:none;}
  .history .muted{color:var(--muted);font-size:11.5px;}

  .note{font-family:'Poppins',sans-serif;font-size:11.5px;color:var(--muted);margin:10px 2px 0;line-height:1.5;}
  .loading{padding:60px;text-align:center;color:var(--muted);font-family:'Poppins',sans-serif;}
  .shared-tag{
    font-family:'Poppins',sans-serif;font-size:10.5px;color:var(--sage);background:var(--sage-bg);
    padding:2px 8px;border-radius:20px;font-weight:700;
  }

  /* ---------- Laporan Harian form ---------- */
  .card{ background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:20px; }
  .card h2{margin:0 0 14px;font-size:15px;color:var(--brown-dark);font-family:'Poppins',sans-serif;}
  .field-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:6px;}
  .field{font-family:'Poppins',sans-serif;}
  .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
  .field input, .field textarea, .field select{
    width:100%;border:1.5px solid var(--line);border-radius:7px;padding:8px 10px;font-size:13.5px;
    font-family:'Poppins',sans-serif;color:var(--ink);background:var(--cream);
  }
  .field input:focus, .field textarea:focus, .field select:focus{outline:none;border-color:var(--sage);background:#fff;}
  .field textarea{resize:vertical;min-height:44px;}
  .field input[type="date"]{
    text-align:left;
    -webkit-appearance:none;
    appearance:none;
    background:var(--panel);
    border-color:var(--line);
  }
  .field input[type="date"]::-webkit-calendar-picker-indicator{
    filter: invert(13%) sepia(75%) saturate(3200%) hue-rotate(335deg) brightness(75%) contrast(95%);
    opacity:0.85;
    cursor:pointer;
    padding:2px;
  }
  .field input[type="date"]::-webkit-datetime-edit{ text-align:left; }
  .field input[type="date"]::-webkit-datetime-edit-fields-wrapper{ display:flex;justify-content:flex-start; }

  .expense-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center;font-family:'Poppins',sans-serif;}
  .expense-row input, .expense-row select{
    border:1.5px solid var(--line);border-radius:7px;padding:8px 10px;font-size:13px;background:var(--cream);
    min-width:0;font-family:'Poppins',sans-serif;color:var(--ink);
  }
  .expense-row select.exp-select{flex:1 1 100%;}
  .expense-row input.exp-nama{flex:1 1 100%;}
  .expense-row input.exp-nominal{flex:1 1 auto;text-align:right;}
  .expense-row .btn-danger-text{flex:0 0 auto;}
  @media (min-width:480px){
    .expense-row select.exp-select{flex:2 1 0;}
    .expense-row input.exp-nominal{flex:1 1 0;}
  }

  .kas-summary{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:10px;
    font-family:'Poppins',sans-serif;
  }
  .kas-summary .box{background:var(--cream);border-radius:8px;padding:10px 12px;}
  .kas-summary .box .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .kas-summary .box .val{font-size:16px;font-weight:700;color:var(--brown-dark);margin-top:3px;}
  .kas-summary .box.highlight{background:var(--sage-bg);}
  .kas-summary .box.highlight .val{color:var(--sage);}
  .kas-warn{
    font-family:'Poppins',sans-serif;font-size:11px;color:var(--rust);background:var(--rust-bg);
    padding:8px 10px;border-radius:7px;margin-top:10px;line-height:1.5;
  }

  .stok-grid-wrap{overflow-x:auto;}
  .stok-grid-head, .stok-grid-row{
    display:grid;grid-template-columns:1.6fr .6fr .9fr .9fr .9fr .9fr;gap:8px;align-items:center;
    font-family:'Poppins',sans-serif;font-size:12.5px;padding:7px 4px;border-bottom:1px dashed var(--line);
    min-width:560px;
  }
  .stok-grid-head{ font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;border-bottom:1.5px solid var(--line); }
  .stok-grid-row input{
    width:100%;border:1.5px solid var(--line);border-radius:6px;padding:5px 7px;font-size:12.5px;text-align:right;
    background:var(--cream);font-family:'Poppins',sans-serif;
  }
  .stok-grid-row .readonly{color:var(--muted);text-align:right;}
  .stok-grid-row .pemakaian-live{font-weight:700;color:var(--brown-dark);text-align:right;}
  .stok-grid-row .pemakaian-live.neg{color:var(--rust);}

  .list-simple{list-style:none;margin:0;padding:0;font-family:'Poppins',sans-serif;}
  .list-simple li{
    display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;
    border-bottom:1px dashed var(--line);font-size:13px;
  }
  .list-simple li:last-child{border-bottom:none;}
  .list-simple .tag-done{
    font-size:10px;background:var(--sage-bg);color:var(--sage);padding:2px 8px;border-radius:20px;font-weight:700;
  }
  .list-simple .tag-open{
    font-size:10px;background:var(--rust-bg);color:var(--rust);padding:2px 8px;border-radius:20px;font-weight:700;
  }

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(43,29,20,0.45);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:20px;overflow-y:auto;
  }
  .modal-card{
    background:var(--panel);border-radius:12px;padding:24px;max-width:340px;width:100%;
    font-family:'Poppins',sans-serif;
  }
  .modal-card h3{margin:0 0 14px;font-size:15px;color:var(--brown-dark);font-family:'Poppins',sans-serif;}
  .modal-card .pin-field{margin-bottom:12px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading">Memuat…</div>
</div>

<script>
const ITEMS_KEY = "iruka-stok:items";
const PERIODE_KEY = "iruka-stok:periode";
const HISTORY_KEY = "iruka-stok:history";
const PINS_KEY = "iruka-stok:pins";
const DAILY_KEY = "iruka-stok:dailyReports";
const DEBTS_KEY = "iruka-stok:debts";
const RESTOCK_KEY = "iruka-stok:restock";
const SHEETS_URL_KEY = "iruka-stok:sheetsUrl";
// URL Web App Apps Script ditanam langsung di sini, jadi device/browser baru mana pun
// yang buka link aplikasi ini otomatis tersambung ke Sheets yang sama, tanpa perlu
// tempel URL manual satu-satu per HP/laptop.

// ---------- Universal storage helper ----------
// window.storage cuma tersedia kalau file ini dibuka lewat panel artifact Claude.
// Kalau di-hosting sendiri (Scalev, dsb), fallback ke localStorage (per-device),
// sementara Google Sheets berfungsi sebagai sumber data yang benar-benar sama
// di semua perangkat/anggota tim (lihat fetchStateFromSheets di bawah).
const CAN_USE_ARTIFACT_STORAGE = (typeof window !== "undefined") && !!window.storage;

async function localGet(key){
  if(CAN_USE_ARTIFACT_STORAGE){
    try{ const r = await window.storage.get(key, true); return r ? r.value : null; }
    catch(e){ return null; }
  }
  try{ return window.localStorage.getItem(key); }catch(e){ return null; }
}
async function localSet(key, value){
  if(CAN_USE_ARTIFACT_STORAGE){
    try{ await window.storage.set(key, value, true); }catch(e){ console.error(e); }
    return;
  }
  try{ window.localStorage.setItem(key, value); }catch(e){ console.error(e); }
}

function fmtRp(n){
  if(!isFinite(n)) n = 0;
  return "Rp " + Math.round(n).toLocaleString("id-ID");
}
function fmtNum(n){
  if(!isFinite(n)) n = 0;
  const rounded = Math.round(n*100)/100;
  return rounded.toLocaleString("id-ID");
}
function uid(prefix){
  return (prefix||'id') + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function escapeHtml(str){
  if(str === undefined || str === null) return "";
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}
function todayIso(){
  return new Date().toISOString().slice(0,10);
}

function computeItem(it){
  const saldoAwalQty = Number(it.saldoAwalQty)||0;
  const saldoAwalNilai = Number(it.saldoAwalNilai)||0;
  const pembelianQty = Number(it.pembelianQty)||0;
  const pembelianNilai = Number(it.pembelianNilai)||0;
  const pemakaianQty = Number(it.pemakaianQty)||0;

  const saldoAkhirQty = saldoAwalQty + pembelianQty - pemakaianQty;
  const totalQtyMasuk = saldoAwalQty + pembelianQty;
  const totalNilaiMasuk = saldoAwalNilai + pembelianNilai;
  const hargaRata = totalQtyMasuk > 0 ? totalNilaiMasuk/totalQtyMasuk : 0;
  const nilaiSaldoAkhir = saldoAkhirQty * hargaRata;

  return {saldoAkhirQty, hargaRata, nilaiSaldoAkhir};
}

function defaultPeriode(){
  const d = new Date();
  return d.toLocaleDateString("id-ID",{month:"long",year:"numeric"});
}

async function loadAll(){
  try{
    const [itemsRaw, periodeRaw, historyRaw, pinsRaw, dailyRaw, debtsRaw, restockRaw, sheetsUrlRaw] = await Promise.all([
      localGet(ITEMS_KEY), localGet(PERIODE_KEY), localGet(HISTORY_KEY), localGet(PINS_KEY),
      localGet(DAILY_KEY), localGet(DEBTS_KEY), localGet(RESTOCK_KEY), localGet(SHEETS_URL_KEY)
    ]);
    state.items = itemsRaw ? JSON.parse(itemsRaw) : [];
    state.periode = periodeRaw || defaultPeriode();
    state.history = historyRaw ? JSON.parse(historyRaw) : [];
    state.pins = pinsRaw ? JSON.parse(pinsRaw) : null;
    state.dailyReports = dailyRaw ? JSON.parse(dailyRaw) : [];
    state.debts = debtsRaw ? JSON.parse(debtsRaw) : [];
    state.restock = restockRaw ? JSON.parse(restockRaw) : [];
    state.sheetsUrl = sheetsUrlRaw || DEFAULT_SHEETS_URL || "";
    if(!sheetsUrlRaw && DEFAULT_SHEETS_URL){
      await localSet(SHEETS_URL_KEY, DEFAULT_SHEETS_URL); // cache di device ini juga
    }
    if(!state.pins){
      state.pins = {...DEFAULT_PINS};
      await localSet(PINS_KEY, JSON.stringify(state.pins));
    }
  }catch(e){
    console.error("Gagal memuat data lokal", e);
    state.items = []; state.periode = defaultPeriode(); state.history = [];
    state.pins = {...DEFAULT_PINS}; state.dailyReports = []; state.debts = []; state.restock = [];
    state.sheetsUrl = DEFAULT_SHEETS_URL || "";
  }

  // Kalau tersambung ke Google Sheets, itu jadi sumber data utama (sama di semua device).
  // Cache lokal di atas cuma fallback kalau lagi offline atau fetch-nya gagal.
  if(state.sheetsUrl){
    const remote = await fetchStateFromSheets(state.sheetsUrl);
    if(remote){
      state.items = remote.items;
      state.dailyReports = remote.dailyReports;
      state.debts = remote.debts;
      state.restock = remote.restock;
      state.history = remote.history;
      if(remote.periode) state.periode = remote.periode;
      if(remote.pins) state.pins = remote.pins;
      // simpan cache lokal juga biar tetap ada data kalau nanti offline
      await Promise.all([
        localSet(ITEMS_KEY, JSON.stringify(state.items)),
        localSet(DAILY_KEY, JSON.stringify(state.dailyReports)),
        localSet(DEBTS_KEY, JSON.stringify(state.debts)),
        localSet(RESTOCK_KEY, JSON.stringify(state.restock)),
        localSet(HISTORY_KEY, JSON.stringify(state.history)),
        localSet(PERIODE_KEY, state.periode),
        localSet(PINS_KEY, JSON.stringify(state.pins))
      ]);
    }
  }

  state.loaded = true;
  render();
}

// ---------- Google Sheets sync (via Apps Script Web App) ----------
// Kolom yang diawali "_" itu data teknis buat Sheets bisa dibaca balik jadi database —
// jangan dihapus/diubah manual di Sheets-nya.
function buildItemsRows(){
  return state.items.map(it => {
    const c = computeItem(it);
    return {
      "Nama Bahan Baku": it.nama, "Satuan": it.satuan,
      "Saldo Awal Qty": it.saldoAwalQty, "Saldo Awal Nilai": it.saldoAwalNilai,
      "Pembelian Qty": it.pembelianQty, "Pembelian Nilai": it.pembelianNilai,
      "Pemakaian Qty": it.pemakaianQty, "Saldo Akhir Qty": c.saldoAkhirQty,
      "Harga Rata-rata": Math.round(c.hargaRata), "Nilai Saldo Akhir": Math.round(c.nilaiSaldoAkhir),
      "_lastFisikQty": it.lastFisikQty === null || it.lastFisikQty === undefined ? "" : it.lastFisikQty
    };
  });
}
function buildDailyRows(){
  return state.dailyReports.map(r => ({
    "Tanggal": r.tanggal, "Periode": r.periode || "", "Cash": r.cash, "QRIS": r.qris, "Total Omset": r.totalOmset,
    "Pengeluaran": (r.expenses||[]).map(e=>`${e.nama}: ${e.nominal}`).join(", "),
    "Total Pengeluaran": r.totalPengeluaran, "Kas Bersih": r.kasBersih,
    "_expenses_json": JSON.stringify(r.expenses||[])
  }));

async function syncToSheets(sheetName, rows){
  if(!state.sheetsUrl) return;
  try{
    // mode "no-cors" wajib untuk Apps Script Web App: browser tetap kirim request-nya,
    // tapi responsnya jadi "opaque" (gak bisa dibaca isinya). Ini normal & bukan tanda gagal —
    // satu-satunya cara verifikasi beneran sukses adalah cek langsung ke sheet-nya.
    await fetch(state.sheetsUrl, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ sheet: sheetName, rows })
    });
    state.sheetsLastSync = { at: new Date().toISOString(), ok: true, sheet: sheetName };
  }catch(e){
    console.error("Gagal sync ke Google Sheets:", e);
    state.sheetsLastSync = { at: new Date().toISOString(), ok: false, sheet: sheetName };
  }
}

async function fetchStateFromSheets(url){
  try{
    const sep = url.includes("?") ? "&" : "?";
    const res = await fetch(url + sep + "action=getAll", { method: "GET" });
    if(!res.ok) throw new Error("status " + res.status);
    const data = await res.json();
    // Penting: cek marker ini dulu. Kalau Apps Script belum di-deploy ulang
    // ("New version") setelah update kode, URL yang sama masih menjalankan
    // kode LAMA yang gak paham ?action=getAll — dia cuma balas pesan health-check
    // biasa tanpa marker ini. Kalau langsung dipercaya, app bisa salah kira itu
    // "data kosong" dan menimpa data lokal yang sebenarnya masih lengkap.
    if(!data || data._iruka_sync !== true){
      console.error("Respons Apps Script belum format terbaru (kemungkinan belum di-deploy ulang). Data lokal dipertahankan, tidak ditimpa.");
      return null;
    }
    return normalizeRemoteState(data);
  }catch(e){
    console.error("Gagal ambil data dari Google Sheets:", e);
    return null;
  }
}

function cleanDateStr(v){
  // Google Sheets kadang otomatis ubah teks tanggal jadi tipe Date pas ditulis,
  // jadi pas dibaca balik lewat JSON, muncul format lengkap "2026-07-22T16:00:00.000Z".
  // Ambil cuma bagian yyyy-MM-dd nya.
  if(!v) return "";
  const s = String(v);
  const m = /^(\d{4}-\d{2}-\d{2})/.exec(s);
  return m ? m[1] : s;
}

function normalizeRemoteState(data){
  const items = (data.KartuStok || []).map(row => ({
    id: uid('it'),
    nama: row["Nama Bahan Baku"] || "",
    satuan: row["Satuan"] || "",
    saldoAwalQty: Number(row["Saldo Awal Qty"]) || 0,
    saldoAwalNilai: Number(row["Saldo Awal Nilai"]) || 0,
    pembelianQty: Number(row["Pembelian Qty"]) || 0,
    pembelianNilai: Number(row["Pembelian Nilai"]) || 0,
    pemakaianQty: Number(row["Pemakaian Qty"]) || 0,
    lastFisikQty: (row["_lastFisikQty"] !== undefined && row["_lastFisikQty"] !== "")
      ? Number(row["_lastFisikQty"]) : null
  }));

  const dailyReports = (data.LaporanHarian || []).map(row => {
    let expenses = [];
    try{ expenses = JSON.parse(row["_expenses_json"] || "[]"); }catch(e){ expenses = []; }
    return {
      id: uid('rep'),
      tanggal: cleanDateStr(row["Tanggal"]),
      periode: row["Periode"] || "",
      cash: Number(row["Cash"]) || 0,
      qris: Number(row["QRIS"]) || 0,
      totalOmset: Number(row["Total Omset"]) || 0,
      expenses,
      totalPengeluaran: Number(row["Total Pengeluaran"]) || 0,
      kasBersih: Number(row["Kas Bersih"]) || 0,
      createdAt: new Date().toISOString(),
      createdBy: "sync"
    };
  });

  const debts = (data.Hutang || []).map(row => ({
    id: uid('debt'), keterangan: row["Keterangan"] || "", tanggal: cleanDateStr(row["Tanggal"]), status: row["Status"] || "belum"
  }));

  const restock = (data.Restock || []).map(row => ({
    id: uid('rs'), nama: row["Nama Bahan"] || "", tanggal: cleanDateStr(row["Tanggal"]), status: row["Status"] || "belum"
  }));

  const history = (data.RiwayatPeriode || []).map(row => ({
    periode: row["Periode"] || "", total: Number(row["Total"]) || 0, closedAt: row["DitutupPada"] || new Date().toISOString()
  }));

  let periode = null, pins = null;
  if(data.Meta && data.Meta.length > 0){
    const meta = data.Meta[0];
    if(meta["Periode"]) periode = meta["Periode"];
    if(meta["PinsJson"]){ try{ pins = JSON.parse(meta["PinsJson"]); }catch(e){} }
  }

  return { items, dailyReports, debts, restock, history, periode, pins };
}

async function tutupPeriode(){
  if(!isOwner()){ return; }
  if(state.items.length === 0){ alert("Belum ada item untuk ditutup."); return; }
  const totalNilai = state.items.reduce((sum,it) => sum + computeItem(it).nilaiSaldoAkhir, 0);
  const ok = confirm(
    `Tutup periode "${state.periode}"?\n\n` +
    `Total Nilai Persediaan: ${fmtRp(totalNilai)}\n\n` +
    `Saldo Akhir tiap item akan menjadi Saldo Awal periode berikutnya.\n` +
    `Kolom Pembelian & Pemakaian akan direset ke 0.`
  );
  if(!ok) return;

  state.history.unshift({ periode: state.periode, total: totalNilai, closedAt: new Date().toISOString() });
  if(state.history.length > 24) state.history = state.history.slice(0,24);

  state.items = state.items.map(it => {
    const c = computeItem(it);
    return {
      ...it,
      saldoAwalQty: Number(c.saldoAkhirQty.toFixed(3)),
      saldoAwalNilai: Number(c.nilaiSaldoAkhir.toFixed(2)),
      pembelianQty: 0, pembelianNilai: 0, pemakaianQty: 0,
      lastFisikQty: null // reset acuan hitung harian, mulai lagi dari saldo awal periode baru
    };
  });
  state.periode = nextPeriodeLabel(state.periode);
  await Promise.all([saveItems(), saveHistory(), savePeriode()]);
  render();
}

function nextPeriodeLabel(label){
  const bulanList = ["januari","februari","maret","april","mei","juni","juli","agustus","september","oktober","november","desember"];
  const parts = label.trim().toLowerCase().split(" ");
  if(parts.length === 2){
    const idx = bulanList.indexOf(parts[0]);
    const year = parseInt(parts[1],10);
    if(idx >= 0 && !isNaN(year)){
      const nextIdx = (idx+1) % 12;
      const nextYear = idx === 11 ? year+1 : year;
      const cap = bulanList[nextIdx][0].toUpperCase()+bulanList[nextIdx].slice(1);
      return `${cap} ${nextYear}`;
    }
  }
  return label + " (baru)";
}

function dailyBaseQty(item){
  return item.lastFisikQty !== null && item.lastFisikQty !== undefined
    ? Number(item.lastFisikQty)
    : Number(item.saldoAwalQty)||0;
}

async function submitDailyReport(){
  ensureDailyForm();
  const cash = Number(dailyForm.cash)||0;
  const qris = Number(dailyForm.qris)||0;
  const totalOmset = cash + qris;
  const expenseItems = dailyForm.expenses.filter(e => e.nama.trim() !== "" || Number(e.nominal)>0);
  const totalPengeluaran = expenseItems.reduce((s,e)=> s + (Number(e.nominal)||0), 0);
  const kasBersih = totalOmset - totalPengeluaran;

  // proses stok fisik per item
  state.items.forEach(it => {
    const s = dailyForm.stok[it.id];
    if(!s) return;
    const fisikEntered = s.fisikQty !== "" && s.fisikQty !== undefined && s.fisikQty !== null;
    const pembelianQty = Number(s.pembelianQty)||0;
    const pembelianNilai = Number(s.pembelianNilai)||0;

    if(pembelianQty > 0){
      it.pembelianQty = (Number(it.pembelianQty)||0) + pembelianQty;
      it.pembelianNilai = (Number(it.pembelianNilai)||0) + pembelianNilai;
    }
    if(fisikEntered){
      const base = dailyBaseQty(it);
      const fisik = Number(s.fisikQty)||0;
      const pemakaianHariIni = base + pembelianQty - fisik;
      it.pemakaianQty = (Number(it.pemakaianQty)||0) + pemakaianHariIni;
      it.lastFisikQty = fisik;
    }
  });

  const reportEntry = {
    id: uid('rep'),
    tanggal: dailyForm.tanggal,
    periode: state.periode,
    cash, qris, totalOmset,
    expenses: expenseItems.map(e=>({nama:e.nama, nominal:Number(e.nominal)||0})),
    totalPengeluaran, kasBersih,
    createdAt: new Date().toISOString(),
    createdBy: session.role
  };
  state.dailyReports.unshift(reportEntry);

  if(dailyForm.hutangBaru.trim() !== ""){
    state.debts.unshift({ id: uid('debt'), keterangan: dailyForm.hutangBaru.trim(), tanggal: dailyForm.tanggal, status: "belum" });
  }
  if(dailyForm.restockBaru.trim() !== ""){
    dailyForm.restockBaru.split(",").map(s=>s.trim()).filter(Boolean).forEach(nama => {
      state.restock.unshift({ id: uid('rs'), nama, tanggal: dailyForm.tanggal, status: "belum" });
    });
  }

  await Promise.all([saveItems(), saveDaily(), saveDebts(), saveRestock()]);
  dailyForm = null;
  alert("Laporan harian tersimpan.");
  render();
}

  const active = document.activeElement;
  let focusKey = null, selStart = null, selEnd = null;
  if(active && active.dataset && active.dataset.key && app.contains(active)){
    focusKey = active.dataset.key;
    if(typeof active.selectionStart === "number"){
      selStart = active.selectionStart;
      selEnd = active.selectionEnd;
    }
  }
  app.innerHTML = html;
  if(focusKey){
    const el = app.querySelector(`[data-key="${focusKey}"]`);
    if(el){
      el.focus({preventScroll:true});
      if(selStart !== null && typeof el.setSelectionRange === "function"){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

          <td class="num"><input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-saldoAwalQty-table" value="${it.saldoAwalQty}"
              oninput="updateField('${it.id}','saldoAwalQty',this.value)"></td>
          <td class="num"><input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-saldoAwalNilai-table" value="${it.saldoAwalNilai}"
              oninput="updateField('${it.id}','saldoAwalNilai',this.value)"></td>
          <td class="num"><input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-pembelianQty-table" value="${it.pembelianQty}"
              oninput="updateField('${it.id}','pembelianQty',this.value)"></td>
          <td class="num"><input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-pembelianNilai-table" value="${it.pembelianNilai}"
              oninput="updateField('${it.id}','pembelianNilai',this.value)"></td>
          <td class="num"><input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-pemakaianQty-table" value="${it.pemakaianQty}"
              oninput="updateField('${it.id}','pemakaianQty',this.value)"></td>
          <td class="num computed">${fmtNum(c.saldoAkhirQty)} ${low ? '<span class="badge-low">HABIS</span>':''}</td>
          <td class="num computed">${fmtRp(c.hargaRata)}</td>
          <td class="num computed-val">${fmtRp(c.nilaiSaldoAkhir)}</td>
          <td class="num"><button class="btn-danger-text" onclick="removeItem('${it.id}')">Hapus</button></td>
        </tr>`;
    });
  }

  let historyRows = "";
  if(state.history.length === 0){
    historyRows = `<li class="muted">Belum ada periode yang ditutup.</li>`;
  } else {
    state.history.slice(0,6).forEach(h => {
      const d = new Date(h.closedAt);
      const tgl = d.toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric"});
      historyRows += `<li><span>${escapeHtml(h.periode)} <span class="muted">— ditutup ${tgl}</span></span><strong>${fmtRp(h.total)}</strong></li>`;
    });
  }

  let mobileCards = "";
  if(state.items.length === 0){
    mobileCards = `<div class="empty">Belum ada bahan baku. Ketuk "+ Tambah Bahan" untuk mulai.</div>`;
  } else {
    state.items.forEach((it, idx) => {
      const c = totals[idx];
      const low = c.saldoAkhirQty <= 0;
      mobileCards += `
        <div class="item-card">
          <div class="item-card-head">
            <input class="nama-input" data-key="it-${it.id}-nama-card" value="${escapeHtml(it.nama)}" placeholder="Nama bahan (mis. Kopi Bubuk Arabika)"
              oninput="updateField('${it.id}','nama',this.value)">
            <input class="satuan-input" data-key="it-${it.id}-satuan-card" value="${escapeHtml(it.satuan)}" placeholder="kg/L/pcs"
              oninput="updateField('${it.id}','satuan',this.value)">
          </div>
          <div class="item-card-grid">
            <div class="mini-field"><label>Saldo Awal Qty</label>
              <input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-saldoAwalQty-card" value="${it.saldoAwalQty}"
                oninput="updateField('${it.id}','saldoAwalQty',this.value)"></div>
            <div class="mini-field"><label>Saldo Awal Nilai</label>
              <input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-saldoAwalNilai-card" value="${it.saldoAwalNilai}"
                oninput="updateField('${it.id}','saldoAwalNilai',this.value)"></div>
            <div class="mini-field"><label>Pembelian Qty</label>
              <input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-pembelianQty-card" value="${it.pembelianQty}"
                oninput="updateField('${it.id}','pembelianQty',this.value)"></div>
            <div class="mini-field"><label>Pembelian Nilai</label>
              <input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-pembelianNilai-card" value="${it.pembelianNilai}"
                oninput="updateField('${it.id}','pembelianNilai',this.value)"></div>
            <div class="mini-field" style="grid-column:1 / -1;"><label>Pemakaian Qty</label>
              <input type="text" inputmode="decimal" step="any" data-key="it-${it.id}-pemakaianQty-card" value="${it.pemakaianQty}"
                oninput="updateField('${it.id}','pemakaianQty',this.value)"></div>
          </div>
          <div class="result-strip">
            <span>Saldo Akhir: <strong>${fmtNum(c.saldoAkhirQty)} ${it.satuan||""}</strong> ${low ? '<span class="badge-low">HABIS</span>':''}</span>
            <span>Harga Rata²: <strong>${fmtRp(c.hargaRata)}</strong></span>
          </div>
          <div class="result-strip">
            <span>Nilai Saldo Akhir</span>
            <span class="val-lg">${fmtRp(c.nilaiSaldoAkhir)}</span>
          </div>
          <div class="card-footer">
            <button class="btn-danger-text" onclick="removeItem('${it.id}')">Hapus Bahan</button>
          </div>
        </div>`;
    });
  }

  return `
    <div class="summary-row">
      <div class="stat hero">
        <div class="lbl">Total Nilai Persediaan</div>
        <div class="val">${fmtRp(totalNilai)}</div>
      </div>
      <div class="stat">
        <div class="lbl">Jumlah Item Bahan Baku</div>
        <div class="val">${state.items.length}</div>
      </div>
      <div class="stat">
        <div class="lbl">Item Habis / Minus</div>
        <div class="val" style="color:${lowStockCount>0 ? 'var(--rust)':'var(--brown-dark)'}">${lowStockCount}</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="left">
        <button class="btn-primary" onclick="openAddItemModal()">+ Tambah Bahan</button>
        <button class="btn-close" onclick="tutupPeriode()" ${owner ? "" : "disabled title='Hanya Owner yang bisa menutup periode'"}>Tutup Periode →</button>
        ${owner ? `<button class="btn-ghost" onclick="openPinModal()">Ubah PIN</button>` : ""}
        ${owner ? `<button class="btn-danger-text" style="border:1px solid var(--rust);border-radius:7px;padding:9px 14px;" onclick="resetAllData()">Hapus Semua Data</button>` : ""}
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th><th>Nama Bahan Baku</th><th>Satuan</th>
            <th class="num">Saldo Awal Qty</th><th class="num">Saldo Awal Nilai</th>
            <th class="num">Pembelian Qty</th><th class="num">Pembelian Nilai</th>
            <th class="num">Pemakaian Qty</th><th class="num">Saldo Akhir Qty</th>
            <th class="num">Harga Rata-rata</th><th class="num">Nilai Saldo Akhir</th><th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr>
            <td colspan="10" style="text-align:right">TOTAL NILAI PERSEDIAAN BAHAN BAKU</td>
            <td class="num">${fmtRp(totalNilai)}</td><td></td>
          </tr>
        </tfoot>
      </table>
    </div>

    <div class="mobile-cards">${mobileCards}</div>

    <p class="note">
      Saldo Akhir Qty = Saldo Awal + Pembelian − Pemakaian &nbsp;•&nbsp;
      Harga Rata-rata = (Nilai Saldo Awal + Nilai Pembelian) ÷ (Qty Saldo Awal + Qty Pembelian) &nbsp;•&nbsp;
      Angka Total di atas = angka yang dimasukkan ke akun <strong>Persediaan Bahan Baku</strong> di Neraca.
      Pembelian &amp; Pemakaian di tabel ini terisi otomatis dari tab <strong>Laporan Harian</strong> — cukup edit manual kalau perlu koreksi.
      Hanya Owner yang bisa mengubah label Periode dan menekan "Tutup Periode".
    </p>

    <div class="history" style="margin-top:20px;">
      <h2>Riwayat Penutupan Periode</h2>
      <ul>${historyRows}</ul>
    </div>
  `;
}

function renderHarianTab(owner){
  ensureDailyForm();

  const cash = Number(dailyForm.cash)||0;
  const qris = Number(dailyForm.qris)||0;
  const totalOmset = cash + qris;
  const totalPengeluaran = dailyForm.expenses.reduce((s,e)=>s+(Number(e.nominal)||0),0);
  const kasBersih = totalOmset - totalPengeluaran;

  let expenseRows = "";
  dailyForm.expenses.forEach(e => {
    const presetOptions = PRESET_EXPENSES.map(p =>
      `<option value="${escapeHtml(p)}" ${(!e.isCustom && e.nama===p) ? 'selected':''}>${escapeHtml(p)}</option>`
    ).join("");
    expenseRows += `
      <div class="expense-row">
        <select class="exp-select" data-key="exp-${e.id}-select" onchange="updateExpensePreset('${e.id}', this.value)">
          <option value="" ${(!e.isCustom && !e.nama) ? 'selected':''}>— Pilih pengeluaran —</option>
          ${presetOptions}
          <option value="__custom__" ${e.isCustom ? 'selected':''}>Lainnya (isi manual)</option>
        </select>
        ${e.isCustom ? `
        <input class="exp-nama" data-key="exp-${e.id}-nama" placeholder="Nama pengeluaran lainnya" value="${escapeHtml(e.nama)}"
          oninput="updateExpenseField('${e.id}','nama',this.value)">` : ""}
        <input class="exp-nominal" data-key="exp-${e.id}-nominal" type="text" inputmode="decimal" placeholder="0" value="${escapeHtml(e.nominal)}"
          oninput="updateExpenseField('${e.id}','nominal',this.value)">
        <button class="btn-danger-text" onclick="removeExpenseRow('${e.id}')">✕</button>
      </div>`;
  });

  let stokRows = "";
  let stokMobileCards = "";
  if(state.items.length === 0){
    stokRows = `<div class="empty">Belum ada bahan baku di Kartu Stok. Tambahkan dulu di tab "Kartu Stok".</div>`;
    stokMobileCards = stokRows;
  } else {
    state.items.forEach(it => {
      const s = dailyForm.stok[it.id] || { pembelianQty:"", pembelianNilai:"", fisikQty:"" };
      const base = dailyBaseQty(it);
      const fisikEntered = s.fisikQty !== "" && s.fisikQty !== undefined;
      const pemakaianLive = fisikEntered
        ? base + (Number(s.pembelianQty)||0) - Number(s.fisikQty)
        : null;
      stokRows += `
        <div class="stok-grid-row">
          <div>${escapeHtml(it.nama || "(belum diberi nama)")} <span class="muted" style="font-size:11px;">${escapeHtml(it.satuan)}</span></div>
          <div class="readonly">${fmtNum(base)}</div>
          <input type="text" inputmode="decimal" step="any" data-key="stok-${it.id}-pembelianQty-table" placeholder="0" value="${escapeHtml(s.pembelianQty)}"
            oninput="updateStokField('${it.id}','pembelianQty',this.value)">
          <input type="text" inputmode="decimal" step="any" data-key="stok-${it.id}-pembelianNilai-table" placeholder="0" value="${escapeHtml(s.pembelianNilai)}"
            oninput="updateStokField('${it.id}','pembelianNilai',this.value)">
          <input type="text" inputmode="decimal" step="any" data-key="stok-${it.id}-fisikQty-table" placeholder="isi hasil hitung fisik" value="${escapeHtml(s.fisikQty)}"
            oninput="updateStokField('${it.id}','fisikQty',this.value)">
          <div class="pemakaian-live ${pemakaianLive!==null && pemakaianLive<0 ? 'neg':''}">
            ${pemakaianLive===null ? '—' : fmtNum(pemakaianLive)}
          </div>
        </div>`;

      stokMobileCards += `
        <div class="item-card">
          <div class="item-card-head">
            <div style="font-weight:700;font-size:14.5px;padding:6px 2px;">${escapeHtml(it.nama || "(belum diberi nama)")}</div>
            <span class="muted" style="font-size:11.5px;padding-top:8px;">${escapeHtml(it.satuan)}</span>
          </div>
          <div class="mini-field" style="margin-bottom:10px;">
            <label>Stok Acuan (terakhir tercatat)</label>
            <input type="text" value="${fmtNum(base)} ${escapeHtml(it.satuan)}" disabled style="text-align:left;color:var(--muted);background:var(--cream);">
          </div>
          <div class="item-card-grid">
            <div class="mini-field"><label>Pembelian Qty</label>
              <input type="text" inputmode="decimal" step="any" data-key="stok-${it.id}-pembelianQty-card" placeholder="0" value="${escapeHtml(s.pembelianQty)}"
                oninput="updateStokField('${it.id}','pembelianQty',this.value)"></div>
            <div class="mini-field"><label>Pembelian Nilai</label>
              <input type="text" inputmode="decimal" step="any" data-key="stok-${it.id}-pembelianNilai-card" placeholder="0" value="${escapeHtml(s.pembelianNilai)}"
                oninput="updateStokField('${it.id}','pembelianNilai',this.value)"></div>
            <div class="mini-field" style="grid-column:1 / -1;"><label>Stok Fisik Sekarang</label>
              <input type="text" inputmode="decimal" step="any" data-key="stok-${it.id}-fisikQty-card" placeholder="isi hasil hitung fisik" value="${escapeHtml(s.fisikQty)}"
                oninput="updateStokField('${it.id}','fisikQty',this.value)"></div>
          </div>
          <div class="result-strip">
            <span>Pemakaian Hari Ini</span>
            <span class="val-lg ${pemakaianLive!==null && pemakaianLive<0 ? 'neg':'pos'}">${pemakaianLive===null ? '—' : fmtNum(pemakaianLive)}</span>
          </div>
        </div>`;
    });
  }

  function reportYearMonth(tanggalStr){
    const m = /^(\d{4})-(\d{2})/.exec(tanggalStr || "");
    return m ? { year: parseInt(m[1],10), month: parseInt(m[2],10) } : null;
  }
  function periodeToYearMonth(label){
    const bulanList = ["januari","februari","maret","april","mei","juni","juli","agustus","september","oktober","november","desember"];
    const parts = (label||"").trim().toLowerCase().split(" ");
    if(parts.length === 2){
      const idx = bulanList.indexOf(parts[0]);
      const year = parseInt(parts[1],10);
      if(idx >= 0 && !isNaN(year)) return { year, month: idx+1 };
    }
    return null;
  }

  const curYM = periodeToYearMonth(state.periode);
  const dailyThisPeriode = curYM
    ? state.dailyReports.filter(r => { const ym = reportYearMonth(r.tanggal); return ym && ym.year===curYM.year && ym.month===curYM.month; })
    : state.dailyReports;
  const dailyOlder = curYM
    ? state.dailyReports.filter(r => { const ym = reportYearMonth(r.tanggal); return !(ym && ym.year===curYM.year && ym.month===curYM.month); })
    : [];

  function renderDailyLi(r){
    return `<li>
      <span>${escapeHtml(r.tanggal)} <span class="muted">— Omset ${fmtRp(r.totalOmset)}, Beban ${fmtRp(r.totalPengeluaran)}</span></span>
      <strong style="color:var(--sage)">${fmtRp(r.kasBersih)}</strong>
    </li>`;
  }

  let dailyHistoryRows = "";
  if(state.dailyReports.length === 0){
    dailyHistoryRows = `<li class="muted">Belum ada laporan harian tersimpan.</li>`;
  } else {
    if(dailyThisPeriode.length === 0){
      dailyHistoryRows += `<li class="muted">Belum ada laporan harian di periode ${escapeHtml(state.periode)}.</li>`;
    } else {
      dailyThisPeriode.forEach(r => { dailyHistoryRows += renderDailyLi(r); });
    }
    if(dailyOlder.length > 0){
      dailyHistoryRows += `
        <li style="border:none;padding-top:10px;">
          <button class="btn-ghost btn-sm" onclick="uiState.dailyArchiveOpen=!uiState.dailyArchiveOpen; render();">
            ${uiState.dailyArchiveOpen ? "▲" : "▼"} Riwayat Bulan Lain (${dailyOlder.length})
          </button>
        </li>`;
      if(uiState.dailyArchiveOpen){
        dailyOlder.forEach(r => { dailyHistoryRows += renderDailyLi(r); });
      }
    }
  }

  function renderItemLi(item, kind){
    const isDebt = kind === "debt";
    const label = isDebt ? escapeHtml(item.keterangan) : escapeHtml(item.nama);
    const done = isDebt ? item.status === "lunas" : item.status === "selesai";
    const tagText = isDebt ? (done ? "LUNAS" : "BELUM") : (done ? "SELESAI" : "PERLU BELI");
    const toggleFn = isDebt ? "toggleDebt" : "toggleRestock";
    return `<li>
      <span>${label} <span class="muted">— ${escapeHtml(item.tanggal)}</span></span>
      <span>
        <span class="${done ? 'tag-done' : 'tag-open'}">${tagText}</span>
        <button class="btn-ghost btn-sm" style="margin-left:6px" onclick="${toggleFn}('${item.id}')">Toggle</button>
      </span>
    </li>`;
  }

  const debtsActive = state.debts.filter(d => d.status !== "lunas");
  const debtsDone = state.debts.filter(d => d.status === "lunas");
  let debtRows = "";
  if(state.debts.length === 0){
    debtRows = `<li class="muted">Tidak ada catatan hutang.</li>`;
  } else {
    if(debtsActive.length === 0){
      debtRows += `<li class="muted">Semua hutang sudah lunas. 🎉</li>`;
    } else {
      debtsActive.forEach(d => { debtRows += renderItemLi(d, "debt"); });
    }
    if(debtsDone.length > 0){
      debtRows += `
        <li style="border:none;padding-top:10px;">
          <button class="btn-ghost btn-sm" onclick="uiState.debtsArchiveOpen=!uiState.debtsArchiveOpen; render();">
            ${uiState.debtsArchiveOpen ? "▲" : "▼"} Riwayat Lunas (${debtsDone.length})
          </button>
        </li>`;
      if(uiState.debtsArchiveOpen){
        debtsDone.forEach(d => { debtRows += renderItemLi(d, "debt"); });
      }
    }
  }

  const restockActive = state.restock.filter(r => r.status !== "selesai");
  const restockDone = state.restock.filter(r => r.status === "selesai");
  let restockRows = "";
  if(state.restock.length === 0){
    restockRows = `<li class="muted">Tidak ada kebutuhan restock tercatat.</li>`;
  } else {
    if(restockActive.length === 0){
      restockRows += `<li class="muted">Semua kebutuhan restock sudah dibeli. 🎉</li>`;
    } else {
      restockActive.forEach(r => { restockRows += renderItemLi(r, "restock"); });
    }
    if(restockDone.length > 0){
      restockRows += `
        <li style="border:none;padding-top:10px;">
          <button class="btn-ghost btn-sm" onclick="uiState.restockArchiveOpen=!uiState.restockArchiveOpen; render();">
            ${uiState.restockArchiveOpen ? "▲" : "▼"} Riwayat Selesai (${restockDone.length})
          </button>
        </li>`;
      if(uiState.restockArchiveOpen){
        restockDone.forEach(r => { restockRows += renderItemLi(r, "restock"); });
      }
    }
  }

  return `
    <div class="card">
      <h2>Laporan Harian — Kas &amp; Pengeluaran</h2>
      <div class="field-grid">
        <div class="field">
          <label>Tanggal</label>
          <input type="date" data-key="daily-tanggal" value="${escapeHtml(dailyForm.tanggal)}" onchange="updateDailyField('tanggal',this.value)">
        </div>
        <div class="field">
          <label>Cash (Rp)</label>
          <input type="text" inputmode="decimal" data-key="daily-cash" placeholder="0" value="${escapeHtml(dailyForm.cash)}" oninput="updateDailyField('cash',this.value)">
        </div>
        <div class="field">
          <label>QRIS (Rp)</label>
          <input type="text" inputmode="decimal" data-key="daily-qris" placeholder="0" value="${escapeHtml(dailyForm.qris)}" oninput="updateDailyField('qris',this.value)">
        </div>
      </div>

      <div style="margin-top:14px;">
        <label style="font-family:'Poppins',sans-serif;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Daftar Pengeluaran Operasional</label>
        <div style="margin-top:8px;">${expenseRows}</div>
        <button class="btn-ghost btn-sm" onclick="addExpenseRow()">+ Tambah Pengeluaran</button>
      </div>

      <div class="kas-summary">
        <div class="box"><div class="lbl">Total Omset (Cash+QRIS)</div><div class="val">${fmtRp(totalOmset)}</div></div>
        <div class="box"><div class="lbl">Total Pengeluaran Operasional</div><div class="val">${fmtRp(totalPengeluaran)}</div></div>
        <div class="box highlight"><div class="lbl">Kas Bersih Setelah Pengeluaran</div><div class="val">${fmtRp(kasBersih)}</div></div>
      </div>
      <div class="kas-warn">
        "Kas Bersih" ini bukan Penjualan Bersih secara akuntansi — ini cuma sisa kas fisik setelah beban operasional harian.
        Total Omset di atas tetap yang dicatat sebagai Pendapatan; Total Pengeluaran dicatat sebagai Beban Operasional di Laba Rugi, bukan pengurang omset.
      </div>
    </div>

    <div class="card">
      <h2>Stok Fisik Hari Ini</h2>
      <div class="stok-grid-wrap">
        <div class="stok-grid-head">
          <div>Bahan</div><div style="text-align:right">Stok Acuan</div><div style="text-align:right">Pembelian Qty</div>
          <div style="text-align:right">Pembelian Nilai</div><div style="text-align:right">Stok Fisik Skrg</div><div style="text-align:right">Pemakaian Hari Ini</div>
        </div>
        ${stokRows}
      </div>
      <div class="mobile-stok-cards">${stokMobileCards}</div>
      <p class="note">
        "Stok Acuan" = stok fisik terakhir yang tercatat (atau Saldo Awal periode kalau belum pernah lapor). Isi kolom "Stok Fisik Skrg" dari hasil hitung fisik — sistem otomatis hitung Pemakaian Hari Ini dan menambahkannya ke Kartu Stok. Kosongkan kalau bahan itu tidak dihitung hari ini.
      </p>
    </div>

    <div class="card">
      <h2>Hutang &amp; Kebutuhan Restock (opsional)</h2>
      <div class="field-grid">
        <div class="field">
          <label>Catatan hutang baru</label>
          <textarea data-key="daily-hutang" placeholder="mis. Hutang IRUKA di Kulle: es krim 1 vanilla" oninput="updateDailyField('hutangBaru',this.value)">${escapeHtml(dailyForm.hutangBaru)}</textarea>
        </div>
        <div class="field">
          <label>Bahan yang dibutuhkan (pisah koma)</label>
          <textarea data-key="daily-restock" placeholder="mis. es krim vanilla, cup 12oz" oninput="updateDailyField('restockBaru',this.value)">${escapeHtml(dailyForm.restockBaru)}</textarea>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="left">
        <button class="btn-primary" onclick="submitDailyReport()">Simpan Laporan Hari Ini</button>
      </div>
    </div>

    <div class="history" style="margin-bottom:16px;">
      <h2>Riwayat Laporan Harian — ${escapeHtml(state.periode)}</h2>
      <ul>${dailyHistoryRows}</ul>
    </div>

    <div class="history" style="margin-bottom:16px;">
      <h2>Daftar Hutang ${debtsActive.length > 0 ? `(${debtsActive.length} belum lunas)` : ""}</h2>
      <ul>${debtRows}</ul>
    </div>

    <div class="history">
      <h2>Kebutuhan Restock ${restockActive.length > 0 ? `(${restockActive.length} perlu beli)` : ""}</h2>
      <ul>${restockRows}</ul>
    </div>
  `;
}

function renderPinModal(){
  return `
    <div class="modal-backdrop" onclick="if(event.target===this) closePinModal()">
      <div class="modal-card">
        <h3>Ubah PIN Akses</h3>
        ${modal.error ? `<div class="login-error" style="display:block;">${escapeHtml(modal.error)}</div>` : ""}
        <div class="pin-field">
          <label>PIN baru — PJ Outlet</label>
          <input id="newPjPin" type="text" inputmode="numeric" maxlength="6" value="${escapeHtml(state.pins.pjoutlet)}">
        </div>
        <div class="pin-field">
          <label>PIN baru — Owner</label>
          <input id="newOwnerPin" type="text" inputmode="numeric" maxlength="6" value="${escapeHtml(state.pins.owner)}">
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="closePinModal()">Batal</button>
          <button class="btn-primary" onclick="submitPinChange()">Simpan</button>
        </div>
      </div>
    </div>
  `;
}

function renderAddItemModal(){
  return `
    <div class="modal-backdrop" onclick="if(event.target===this) closeAddItemModal()">
      <div class="modal-card">
        <h3>Tambah Bahan Baku</h3>
        ${itemModal.error ? `<div class="login-error" style="display:block;">${escapeHtml(itemModal.error)}</div>` : ""}
        <div class="field" style="margin-bottom:12px;">
          <label>Nama Bahan</label>
          <select id="newItemSelect" onchange="updateItemPreset(this.value)" autofocus>
            <option value="" ${(!itemModal.isCustom && !itemModal.nama) ? 'selected':''}>— Pilih bahan —</option>
            ${PRESET_ITEMS.map(p => `<option value="${escapeHtml(p.nama)}" ${(!itemModal.isCustom && itemModal.nama===p.nama) ? 'selected':''}>${escapeHtml(p.nama)}</option>`).join("")}
            <option value="__custom__" ${itemModal.isCustom ? 'selected':''}>Lainnya (bahan baru)</option>
          </select>
        </div>
        ${itemModal.isCustom ? `
        <div class="field" style="margin-bottom:12px;">
          <label>Nama Bahan Baru</label>
          <input id="newItemNama" type="text" placeholder="mis. Kopi Bubuk Arabika"
            value="${escapeHtml(itemModal.nama)}" autofocus
            oninput="itemModal.nama=this.value"
            onkeydown="if(event.key==='Enter') submitNewItem()">
        </div>` : ""}
        <div class="field" style="margin-bottom:12px;">
          <label>Satuan</label>
          <input id="newItemSatuan" type="text" placeholder="kg / L / pcs"
            value="${escapeHtml(itemModal.satuan)}"
            oninput="itemModal.satuan=this.value"
            onkeydown="if(event.key==='Enter') submitNewItem()">
        </div>
        <div class="field-grid" style="margin-bottom:4px;">
          <div class="field">
            <label>Saldo Awal Qty</label>
            <input id="newItemQty" type="text" inputmode="decimal" step="any" placeholder="0"
              value="${escapeHtml(itemModal.saldoAwalQty)}"
              oninput="itemModal.saldoAwalQty=this.value"
              onkeydown="if(event.key==='Enter') submitNewItem()">
          </div>
          <div class="field">
            <label>Saldo Awal Nilai (Rp)</label>
            <input id="newItemNilai" type="text" inputmode="decimal" step="any" placeholder="0"
              value="${escapeHtml(itemModal.saldoAwalNilai)}"
              oninput="itemModal.saldoAwalNilai=this.value"
              onkeydown="if(event.key==='Enter') submitNewItem()">
          </div>
        </div>
        <p class="note" style="margin:8px 2px 0;">Kosongkan Saldo Awal kalau bahan ini baru pertama kali dibeli periode ini — nanti tinggal isi dari Laporan Harian.</p>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeAddItemModal()">Batal</button>
          <button class="btn-primary" onclick="submitNewItem()">Tambah</button>
        </div>
      </div>
    </div>
  `;
}

loadAll();
</script>
</body>
</html>
